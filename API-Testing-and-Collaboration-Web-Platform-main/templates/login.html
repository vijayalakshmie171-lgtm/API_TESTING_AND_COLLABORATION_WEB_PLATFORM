{% extends "base.html" %}
{% block title %}Login – API Testing Platform{% endblock %}
{% block body %}
<div class="auth-wrapper">
  <div class="auth-decor auth-decor-1"></div>
  <div class="auth-decor auth-decor-2"></div>
  <div class="auth-box">
    <h1>API Testing Platform</h1>
    <h2>Log in</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login_page') }}">
      <div class="input-group">
        <input type="email" id="email" name="email" required autocomplete="email" placeholder=" ">
        <label for="email">Email</label>
      </div>
      <div class="input-group">
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder=" ">
        <label for="password">Password</label>
      </div>
      <button type="submit">Log in</button>
    </form>
    <p><a href="{{ url_for('signup_page') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
